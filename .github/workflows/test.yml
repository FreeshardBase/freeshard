name: Lint and Test

on:
  workflow_call:
    inputs:
      full:
        type: boolean
        required: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          uv sync --frozen --extra dev
      - name: Run Ruff
        run: |
          uv run ruff check .

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install --break-system-packages uv
          uv sync --frozen --extra dev
      - name: Run Pytest
        env:
          TEST_ENV: ${{ inputs.full && 'full' || 'sparse' }}
        run: |
          uv run pytest tests
