entryPoints:
  http:
    address: ":80"
    # See traefik.yml: finite read timeout reaps abandoned/slowloris connections
    # so traefik does not leak file descriptors until accept() hits EMFILE.
    transport:
      respondingTimeouts:
        readTimeout: "300s"
  mqtt:
    address: ":8883"

providers:
  file:
    directory: "/core/traefik_dyn"
    watch: true
  docker:
    exposedByDefault: false

api:
  dashboard: true
  insecure: true
