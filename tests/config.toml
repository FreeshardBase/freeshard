[apps.lifecycle]
refresh_interval = 2

[apps.last_access]
max_update_frequency = 3

[apps.usage_reporting]
tracking_schedule = "* * * * * *"
reporting_schedule = "* * * * * */3"

[apps.pruning]
enabled = true

[log.levels]
shard_core = "info"
"shard_core.service.app_usage_reporting" = "error"

[telemetry]
enabled = true
